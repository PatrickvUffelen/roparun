<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Verbinding Status - Live</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; font-family: sans-serif; margin: 0; }
        #myButton { 
            padding: 25px 50px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            min-width: 380px; 
            text-transform: uppercase; 
            transition: background-color 0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .green { background-color: #27ae60; }
        .red { background-color: #c0392b; }
        .loading { background-color: #bdc3c7; cursor: wait; }

        .blink { animation: urgent-blink 0.4s infinite; }
        @keyframes urgent-blink {
            0% { background-color: #27ae60; box-shadow: 0 0 10px #27ae60; }
            50% { background-color: #2ecc71; box-shadow: 0 0 30px #2ecc71; transform: scale(1.02); }
            100% { background-color: #27ae60; }
        }
    </style>
</head>
<body>

    <button id="myButton" class="loading">Verbinding zoeken...</button>

    <script>
        const btn = document.getElementById('myButton');
        
        // Dit is je persoonlijke database-sleutel. 
        // Je kunt 'mijn_unieke_bucket_123' aanpassen naar iets willekeurigs voor meer privacy.
        const bucketPath = "https://kvdb.io/4y9NnBq5T8zK3Lp6R9wQ2X/status_key"; 

        let currentStatus = "";
        let blinkActive = false;

        // 1. Status ophalen
        async function checkStatus() {
            try {
                const response = await fetch(bucketPath);
                if (!response.ok) throw new Error("Nog geen data");
                const status = await response.text();
                
                if (status !== currentStatus) {
                    currentStatus = status;
                    updateVisuals(status);
                }
            } catch (e) {
                // Als de database leeg is, zet hem dan op groen als startwaarde
                updateStatusOnServer("green");
            }
        }

        // 2. Visuele update
        function updateVisuals(status) {
            if (status === 'red') {
                btn.className = 'red';
                btn.textContent = 'Verbinding nog niet gereed';
                blinkActive = false;
            } else {
                btn.className = 'green' + (blinkActive ? ' blink' : '');
                btn.textContent = 'Verbinding gereed';
            }
        }

        // 3. Status opslaan op de server
        async function updateStatusOnServer(newStatus) {
            await fetch(bucketPath, {
                method: 'POST',
                body: newStatus
            });
            checkStatus();
        }

        // 4. Klik actie
        btn.addEventListener('click', async function() {
            const nextStatus = (currentStatus === 'green') ? 'red' : 'green';
            
            if (nextStatus === 'green') {
                blinkActive = true;
                setTimeout(() => {
                    blinkActive = false;
                    updateVisuals('green');
                }, 10000);
            }

            btn.classList.add('loading');
            await updateStatusOnServer(nextStatus);
        });

        // Elke 2 seconden synchroniseren
        setInterval(checkStatus, 2000);
        checkStatus();
    </script>
</body>
</html>
