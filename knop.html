<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Live Status Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f4f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
        }
        
        #myButton { 
            padding: 25px 50px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            min-width: 380px; 
            text-transform: uppercase; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            outline: none;
            letter-spacing: 1px;
        }

        /* Statussen */
        .green { background-color: #27ae60; }
        .red { background-color: #c0392b; }
        .loading { background-color: #7f8c8d; cursor: wait; opacity: 0.6; }

        /* Opvallend flikkeren */
        .blink { 
            animation: urgent-blink 0.4s infinite; 
        }

        @keyframes urgent-blink {
            0% { background-color: #27ae60; box-shadow: 0 0 10px #27ae60; }
            50% { background-color: #2ecc71; box-shadow: 0 0 30px #2ecc71; transform: scale(1.03); }
            100% { background-color: #27ae60; }
        }
    </style>
</head>
<body>

    <button id="myButton" class="loading">Verbinding maken...</button>

    <script type="module">
      // Firebase bibliotheken laden via CDN
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      // Jouw specifieke Firebase configuratie
      const firebaseConfig = {
        databaseURL: "https://audioknop-default-rtdb.europe-west1.firebasedatabase.app/"
      };

      // Initialiseer Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const statusRef = ref(db, 'verbinding_status');

      const btn = document.getElementById('myButton');
      let currentStatus = "";
      let blinkActive = false;
      let blinkTimeout;

      // LUISTEREN: Update de knop als de database verandert
      onValue(statusRef, (snapshot) => {
          const status = snapshot.val();
          
          // Als de database nog helemaal leeg is, zet hem op groen
          if (status === null) {
              set(statusRef, "green");
              return;
          }

          currentStatus = status;
          btn.classList.remove('loading');
          updateVisuals(status);
      }, (error) => {
          console.error("Firebase fout:", error);
          btn.textContent = "Regels niet op Testmodus?";
      });

      function updateVisuals(status) {
          if (status === 'red') {
              btn.className = 'red';
              btn.textContent = 'Verbinding nog niet gereed';
              blinkActive = false;
              clearTimeout(blinkTimeout);
          } else {
              btn.className = 'green' + (blinkActive ? ' blink' : '');
              btn.textContent = 'Verbinding gereed';
          }
      }

      // KLIKKEN: Wissel de status in de database
      btn.addEventListener('click', () => {
          if (btn.classList.contains('loading')) return;

          const nextStatus = (currentStatus === 'green') ? 'red' : 'green';

          // Als we naar groen gaan, start de 10 seconden timer voor het flikkeren
          if (nextStatus === 'green') {
              blinkActive = true;
              updateVisuals('green');
              blinkTimeout = setTimeout(() => {
                  blinkActive = false;
                  updateVisuals('green');
              }, 10000);
          }

          // Update de database (dit triggert onValue voor iedereen)
          set(statusRef, nextStatus);
      });
    </script>
</body>
</html>
