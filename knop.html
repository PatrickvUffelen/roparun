<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Status Monitor</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; font-family: sans-serif; margin: 0; }
        #myButton { 
            padding: 25px 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer; border: none; 
            border-radius: 12px; color: white; min-width: 380px; text-transform: uppercase; 
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none;
        }
        .green { background-color: #27ae60; }
        .red { background-color: #c0392b; }
        .loading { background-color: #7f8c8d; cursor: wait; opacity: 0.7; }

        .blink { animation: urgent-blink 0.4s infinite; }
        @keyframes urgent-blink {
            0% { background-color: #27ae60; box-shadow: 0 0 10px #27ae60; }
            50% { background-color: #2ecc71; box-shadow: 0 0 30px #2ecc71; transform: scale(1.02); }
            100% { background-color: #27ae60; }
        }
    </style>
</head>
<body>

    <button id="myButton" class="loading">Verbinding maken...</button>

    <script>
        const btn = document.getElementById('myButton');
        
        // Gebruik een unieke sleutel voor jouw project op GitHub
        const namespace = "mijn-unieke-knop-2024";
        const key = "status";
        const apiUrl = `https://api.countapi.xyz/hit/${namespace}/${key}`;
        const getUrl = `https://api.countapi.xyz/get/${namespace}/${key}`;

        let currentStatus = "";
        let blinkActive = false;

        async function updateStatus() {
            try {
                const response = await fetch(getUrl);
                if (!response.ok) {
                    // Als de sleutel nog niet bestaat, maken we hem aan door te 'hitten'
                    await fetch(apiUrl);
                    return;
                }
                const data = await response.json();
                
                // Even getal = Groen, Oneven getal = Rood
                const status = (data.value % 2 === 0) ? 'green' : 'red';
                
                if (status !== currentStatus) {
                    currentStatus = status;
                    render(status);
                }
            } catch (error) {
                console.error("Netwerkfout:", error);
                // Forceer de knop uit de laadstand als de API niet reageert
                if (currentStatus === "") {
                    currentStatus = "green";
                    render("green");
                }
            }
        }

        function render(status) {
            btn.classList.remove('loading');
            if (status === 'red') {
                btn.className = 'red';
                btn.textContent = 'Verbinding nog niet gereed';
                blinkActive = false;
            } else {
                btn.className = 'green' + (blinkActive ? ' blink' : '');
                btn.textContent = 'Verbinding gereed';
            }
        }

        btn.addEventListener('click', async function() {
            if (btn.classList.contains('loading')) return;

            // Als we van rood naar groen gaan, start het knipperen
            if (currentStatus === 'red') {
                blinkActive = true;
                setTimeout(() => {
                    blinkActive = false;
                    render('green');
                }, 10000);
            }

            // Stuur update naar server
            btn.classList.add('loading');
            try {
                await fetch(apiUrl);
                await updateStatus();
            } catch (e) {
                // Fallback voor als internet even hapert
                currentStatus = (currentStatus === 'green') ? 'red' : 'green';
                render(currentStatus);
            }
        });

        // Elke 2 seconden checken op updates van anderen
        setInterval(updateStatus, 2000);
        updateStatus();
    </script>
</body>
</html>
