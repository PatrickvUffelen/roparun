<!-- Puter.js Library voor betrouwbare data-updates -->
<script src="https://js.puter.com/v2/"></script>

<script>
    async function getRoparunData() {
        const teamId = "147";
        const url = `https://www.roparunlive.nl/api/team-detail/${teamId}`;

        try {
            // We gebruiken puter.net.fetch in plaats van de standaard fetch
            // Dit omzeilt de CORS-beveiliging van de Roparun website
            const response = await puter.net.fetch(url);
            
            if (!response.ok) throw new Error('Roparun API onbereikbaar');
            
            const data = await response.json();

            if (data && data.liveData) {
                const speed = data.liveData.speed;
                const covered = data.liveData.distanceCovered;
                const total = data.liveData.distanceTotal;
                const remaining = (total - covered).toFixed(1);

                // Update de interface
                document.getElementById('speed').innerText = speed + " km/u";
                document.getElementById('dist').innerText = covered + " km";
                document.getElementById('rem').innerText = remaining + " km";
                
                // Status melding
                const statusTag = document.getElementById('team-sync-status');
                statusTag.innerText = "Laatste sync: " + new Date().toLocaleTimeString();
                statusTag.style.color = "#3a861d"; // Groen bij succes
            }
        } catch (err) {
            console.error("Update mislukt:", err);
            const statusTag = document.getElementById('team-sync-status');
            statusTag.innerText = "Sync mislukt. Bezig met opnieuw proberen...";
            statusTag.style.color = "#c0392b"; // Rood bij fout
            
            // We zetten de data NIET terug naar een fallback. 
            // De oude data blijft staan of het blijft '--' tot de volgende poging slaagt.
        }
    }
    
    // Probeer elke 30 seconden (vaker mag, maar 30-60s is netjes voor een API)
    setInterval(getRoparunData, 30000);
    
    // Direct uitvoeren bij laden
    getRoparunData();
</script>
