<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Roparun 2026 Live Route - RTV Lansingerland</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* Container voor de info blokken linksonder */
        .info-container {
            position: absolute;
            bottom: 40px; /* Afstand van de onderkant */
            left: 40%;   /* Afstand van de linkerkant */
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 270px;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.4;
        }

        /* Locatie Box */
        .location-box { font-size: 15px; }
        #location-text { display: block; font-weight: 800; font-size: 21px; margin-top: 4px; color: #000; }

        /* Afstand Box */
        .distance-box { font-size: 15px; border-left: 5px solid #d32f2f; }
        #distance-text { display: block; font-weight: 800; font-size: 21px; margin-top: 4px; color: #000; }

        /* Legenda Box */
        .legend-box { font-size: 14px; }
        .legend-box strong { font-size: 16px; display: block; margin-bottom: 8px; }
        .legend-box i { width: 18px; height: 18px; float: left; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc; }
        .legend-item { clear: both; display: flex; align-items: center; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-container">
    <!-- Locatie -->
    <div class="info-box location-box">
        De omroep bus is nu in:
        <span id="location-text">Laden...</span>
    </div>

    <!-- Afstand -->
    <div class="info-box distance-box">
        Nog tot de finish:
        <span id="distance-text">Berekenen...</span>
    </div>

    <!-- Legenda -->
    <div class="info-box legend-box">
        <strong>Roparun 2026 Route</strong>
        <div class="legend-item">
            <i style="background: #0000FF"></i> Lopers Route
        </div>
        <div class="legend-item">
            <i style="background: #00FF00"></i> Bus Route
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Firebase Configuratie
    const firebaseConfig = {
        apiKey: "AIzaSyD7VX_nSWE5L_1296A1QfSYbxwesS3T7Do",
        authDomain: "roparun-tracker.firebaseapp.com",
        databaseURL: "https://roparun-tracker-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "roparun-tracker",
        storageBucket: "roparun-tracker.firebasestorage.app",
        messagingSenderId: "1066019618899",
        appId: "1:1066019618899:web:c6fe8e0b313e88912306a6",
        measurementId: "G-5ZC7JH1904"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const finishLatLng = L.latLng(51.922512, 4.478921);

    const map = L.map('map', { zoomControl: false }).setView([51.5, 3.5], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
        iconSize: [50, 50],
        iconAnchor: [25, 25]
    });

    var busMarker = L.marker([0, 0], {icon: busIcon}).addTo(map);

    async function updateAddress(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            const city = data.address.city || data.address.town || data.address.village || data.address.municipality || "Onderweg...";
            document.getElementById('location-text').innerText = city;
        } catch (error) { console.error("Adres service niet bereikbaar"); }
    }

    db.ref("bus").on("value", function(snapshot) {
        var data = snapshot.val();
        if(data && data.lat && data.lng){
            var currentPos = L.latLng(data.lat, data.lng);
            busMarker.setLatLng(currentPos);
            map.setView(currentPos, map.getZoom(), { animate: true });
            updateAddress(data.lat, data.lng);
            var distance = currentPos.distanceTo(finishLatLng) / 1000;
            document.getElementById('distance-text').innerText = distance.toFixed(1) + " km";
        }
    });

    fetch('https://patrickvuffelen.github.io/roparun/map.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                filter: function(feature) { return feature.geometry.type !== 'Point'; },
                style: function(feature) {
                    return { color: feature.properties.stroke || '#FF0000', weight: 5, opacity: 0.8, lineJoin: 'round' };
                }
            }).addTo(map);
        });
</script>

</body>
</html>
