<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Roparun Live Kaart - Ingebouwde Route</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <!-- Plugin om KML tekst te verwerken -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-plugins/3.4.0/layer/vector/KML.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin:0; padding:0; overflow: hidden; }
        #map { height:100vh; width:100vw; background: #f0f0f0; }
    </style>
</head>

<body>
<div id="map"></div>

<!-- De KML data is hieronder ingevoegd inclusief kilometerpunten -->
<script id="kml-data" type="application/xml">
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>Frankrijk 2026 V3</name>
    <Folder>
      <name>Checkpoints</name>
      <Placemark><name>0.0 km - CP 01 Clastres (START)</name><Point><coordinates>3.224492,49.758974</coordinates></Point></Placemark>
      <Placemark><name>33.5 km - CP 02 Brancourt-le-Grand</name><Point><coordinates>3.381547,49.975993</coordinates></Point></Placemark>
      <Placemark><name>70.5 km - CP 03 Escarmain</name><Point><coordinates>3.547701,50.228917</coordinates></Point></Placemark>
      <Placemark><name>104.7 km - CP 04 Hensies</name><Point><coordinates>3.686302,50.435082</coordinates></Point></Placemark>
      <Placemark><name>150.5 km - CP 05 Lessines</name><Point><coordinates>3.862259,50.735927</coordinates></Point></Placemark>
      <Placemark><name>158.1 km - Doorkomst Geraardsbergen</name><Point><coordinates>3.890357,50.772437</coordinates></Point></Placemark>
      <Placemark><name>200.9 km - CP 06 Opwijk</name><Point><coordinates>4.168688,50.971928</coordinates></Point></Placemark>
      <Placemark><name>238.5 km - CP 07 Kruibeke</name><Point><coordinates>4.32005,51.175448</coordinates></Point></Placemark>
      <Placemark><name>289.8 km - CP 08 Zundert</name><Point><coordinates>4.674281,51.473727</coordinates></Point></Placemark>
      <Placemark><name>325.4 km - CP 09 Dongen</name><Point><coordinates>4.951594,51.618528</coordinates></Point></Placemark>
      <Placemark><name>365.0 km - CP 10 Hoeven</name><Point><coordinates>4.585107,51.581697</coordinates></Point></Placemark>
      <Placemark><name>407.1 km - CP 11 Hoogerheide</name><Point><coordinates>4.333238,51.42308</coordinates></Point></Placemark>
      <Placemark><name>443.0 km - CP 12 Dinteloord</name><Point><coordinates>4.363908,51.629111</coordinates></Point></Placemark>
      <Placemark><name>489.5 km - Samenvoeging NL &amp; FR</name><Point><coordinates>4.536657,51.841368</coordinates></Point></Placemark>
      <Placemark><name>493.1 km - CP 13 Barendrecht</name><Point><coordinates>4.536426,51.856287</coordinates></Point></Placemark>
      <Placemark><name>507.7 km - CP 14 Wilhelminaplein</name><Point><coordinates>4.492581,51.908626</coordinates></Point></Placemark>
      <Placemark><name>511.6 km - CP 15 Coolsingel (FINISH)</name><Point><coordinates>4.478921,51.922512</coordinates></Point></Placemark>
    </Folder>
  </Document>
</kml>
</script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7VX_nSWE5L_1296A1QfSYbxwesS3T7Do",
        authDomain: "roparun-tracker.firebaseapp.com",
        databaseURL: "https://roparun-tracker-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "roparun-tracker",
        storageBucket: "roparun-tracker.firebasestorage.app",
        messagingSenderId: "1066019618899",
        appId: "1:1066019618899:web:c6fe8e0b313e88912306a6",
        measurementId: "G-5ZC7JH1904"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    var map = L.map('map', {
        zoomControl: true, 
        attributionControl: false 
    }).setView([51.5, 3.5], 8); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    /* --- ROUTE LADEN UIT HET DOCUMENT --- */
    try {
        const kmlText = document.getElementById('kml-data').innerHTML;
        const parser = new DOMParser();
        const kml = parser.parseFromString(kmlText, 'text/xml');
        const track = new L.KML(kml);
        map.addLayer(track);
        
        // Zorg dat de markers ook getoond worden
        track.on("add", function() {
            console.log("Route en markers geladen.");
        });

    } catch (e) {
        console.error("KML kon niet worden geladen:", e);
    }

    var busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
        iconSize: [50, 50],
        iconAnchor: [25, 25]
    });

    var marker = L.marker([0, 0], {icon: busIcon}).addTo(map);
    var firstLoad = true;

    db.ref("bus").on("value", function(snapshot) {
        var data = snapshot.val();
        if(data && data.lat && data.lng){
            var latlng = [data.lat, data.lng];
            marker.setLatLng(latlng);

            if(firstLoad) {
                map.setView(latlng, 10, { animate: true });
                firstLoad = false;
            } else {
                map.panTo(latlng, { animate: true, duration: 1.0 });
            }
        }
    });
</script>
</body>
</html>
