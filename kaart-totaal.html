<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Roparun 2026 Live Route - RTV Lansingerland</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        
        .info-container {
            position: absolute;
            bottom: 40px; 
            left: 40px;   
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px; 
        }

        .info-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.5;
            border-left: 8px solid #3a861d;
        }

        .location-box { font-size: 18px; }
        #location-text { display: block; font-weight: 800; font-size: 26px; margin-top: 6px; color: #000; }

        .distance-box { font-size: 18px; }
        #distance-text { display: block; font-weight: 800; font-size: 26px; margin-top: 6px; color: #000; }

        .legend-box { font-size: 18px; }
        .legend-box strong { font-size: 22px; display: block; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .legend-box i { 
            width: 24px; 
            height: 24px; 
            float: left; 
            margin-right: 15px; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
        }
        .legend-item { 
            clear: both; 
            display: flex; 
            align-items: center; 
            margin-bottom: 10px; 
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-container">
    <div class="info-box location-box">
        De omroep bus is nu in:
        <span id="location-text">Laden...</span>
    </div>

    <div class="info-box distance-box">
        Nog tot de finish:
        <span id="distance-text">Berekenen...</span>
    </div>

    <div class="info-box legend-box">
        <strong>Roparun 2026 Route</strong>
        <div class="legend-item">
            <i style="background: #0000FF"></i> Lopers Route
        </div>
        <div class="legend-item">
            <i style="background: #00FF00"></i> Bus Route
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD7VX_nSWE5L_1296A1QfSYbxwesS3T7Do",
        authDomain: "roparun-tracker.firebaseapp.com",
        databaseURL: "https://roparun-tracker-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "roparun-tracker",
        storageBucket: "roparun-tracker.firebasestorage.app",
        messagingSenderId: "1066019618899",
        appId: "1:1066019618899:web:c6fe8e0b313e88912306a6",
        measurementId: "G-5ZC7JH1904"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const finishLatLng = L.latLng(51.922512, 4.478921);

    const map = L.map('map', { 
        zoomControl: false,
        dragging: true,
        scrollWheelZoom: true 
    }); 

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var finishIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/4744/4744812.png', 
        iconSize: [60, 60],
        iconAnchor: [30, 60] 
    });
    L.marker(finishLatLng, {icon: finishIcon}).addTo(map);

    var busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
        iconSize: [80, 80],      
        iconAnchor: [40, 80]     
    });

    var busMarker = L.marker([0, 0], {icon: busIcon}).addTo(map);

    async function updateAddress(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            const city = data.address.city || data.address.town || data.address.village || data.address.municipality || "Onderweg...";
            document.getElementById('location-text').innerText = city;
        } catch (error) { console.error("Adres service niet bereikbaar"); }
    }

    db.ref("bus").on("value", function(snapshot) {
        var data = snapshot.val();
        if(data && data.lat && data.lng){
            var currentPos = L.latLng(data.lat, data.lng);
            busMarker.setLatLng(currentPos);
            updateAddress(data.lat, data.lng);
            var distance = currentPos.distanceTo(finishLatLng) / 1000;
            document.getElementById('distance-text').innerText = distance.toFixed(1) + " km";
        }
    });

    function loadRoute(url) {
        return fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("Netwerk error");
                return response.json();
            })
            .then(data => {
                var routeLayer = L.geoJSON(data, {
                    filter: function(feature) { return feature.geometry.type !== 'Point'; },
                    style: function(feature) {
                        return { color: feature.properties.stroke || '#FF0000', weight: 7, opacity: 1.0, lineJoin: 'round' };
                    }
                }).addTo(map);
                
                // Past de kaart aan zodat de hele route precies in beeld komt.
                // Padding zorgt dat de lijn niet de rand raakt.
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
            });
    }

    loadRoute('map.geojson').catch(() => {
        loadRoute('https://patrickvuffelen.github.io/roparun/map.geojson');
    });
</script>

</body>
</html>
