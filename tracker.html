<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding-top: 60px;
}

button {
  font-size: 18px;
  padding: 12px 20px;
  margin-top: 20px;
}

#status {
  margin-top: 20px;
  color: #333;
}
</style>
</head>

<body>

<h2>📍 Live GPS Tracking</h2>
<p>Druk op start en geef locatie toestemming</p>

<button onclick="startGPS()">Start tracking</button>

<p id="status">Wacht op start...</p>

<script>

/* Firebase */
  const firebaseConfig = {
    apiKey: "AIzaSyD7VX_nSWE5L_1296A1QfSYbxwesS3T7Do",
    authDomain: "roparun-tracker.firebaseapp.com",
    databaseURL: "https://roparun-tracker-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "roparun-tracker",
    storageBucket: "roparun-tracker.firebasestorage.app",
    messagingSenderId: "1066019618899",
    appId: "1:1066019618899:web:c6fe8e0b313e88912306a6",
    measurementId: "G-5ZC7JH1904"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🚀 GPS start functie */
function startGPS(){

  const status = document.getElementById("status");
  status.innerText = "📡 Vraag om GPS toestemming...";

  if(!navigator.geolocation){
    status.innerText = "❌ GPS niet ondersteund op dit apparaat";
    return;
  }

  /* 🔑 DIT triggert de browser prompt */
  navigator.geolocation.getCurrentPosition(
    function(pos){

      status.innerText = "✅ GPS toegestaan, tracking actief";

      /* daarna live tracking */
      navigator.geolocation.watchPosition(function(pos){

        db.ref("bus").set({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          time: Date.now()
        });

        status.innerText =
          "📍 Live: " +
          pos.coords.latitude.toFixed(5) + ", " +
          pos.coords.longitude.toFixed(5);

      }, function(err){
        status.innerText = "⚠️ GPS fout: " + err.message;
      }, {
        enableHighAccuracy: true,
        maximumAge: 5000,
        timeout: 10000
      });

    },
    function(err){

      if(err.code === 1){
        status.innerText = "❌ Toegang geweigerd. Zet locatie aan in browser instellingen.";
      } else {
        status.innerText = "⚠️ GPS fout: " + err.message;
      }

    }
  );
}

</script>

</body>
</html>
